<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polymarket Trading Data Collector</title>
<script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--card:#161b22;--chart-bg:#111820;
  --border:#21262d;--text:#c9d1d9;--text-dim:#4a5568;
  --green:#00e5a0;--yellow:#f5c842;--red:#f85149;
  --grid:#1e2530;--line:#2d3748;
}
body{background:var(--bg);color:var(--text);font-family:'SF Mono','Cascadia Code','Fira Code',monospace;font-size:13px;overflow-x:hidden}
a{color:var(--green);text-decoration:none}

.header{padding:16px 20px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--border)}
.header h1{font-size:16px;font-weight:600;color:#fff}
.header .status{margin-left:auto;font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:6px}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red)}
.dot.connected{background:var(--green)}
.tick-counter{margin-left:12px;color:var(--text-dim)}

.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 20px}
@media(max-width:900px){.cards{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;transition:border-color .3s}
.card.up-dominant{border-color:rgba(0,229,160,.35)}
.card.down-dominant{border-color:rgba(248,81,73,.35)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card-title{font-size:13px;font-weight:600;color:#fff}
.card-cycle{font-size:11px;color:var(--text-dim)}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.bar-label{width:44px;font-weight:500}
.bar-label.up{color:var(--green)}
.bar-label.down{color:var(--yellow)}
.bar-track{flex:1;height:8px;background:#1e2530;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .3s}
.bar-fill.up{background:var(--green)}
.bar-fill.down{background:var(--yellow)}
.bar-pct{width:40px;text-align:right;font-size:12px;color:var(--text-dim)}
.card-timer{text-align:center;font-size:22px;font-weight:700;color:#fff;margin-top:10px;font-variant-numeric:tabular-nums}
.card-timer .label{font-size:10px;color:var(--text-dim);font-weight:400}

.tabs-row{display:flex;gap:4px;padding:0 20px;margin-top:8px}
.tab{padding:8px 16px;font-size:12px;font-weight:500;border:1px solid var(--border);border-bottom:none;border-radius:8px 8px 0 0;cursor:pointer;color:var(--text-dim);background:transparent;transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active{background:var(--chart-bg);color:#fff;border-color:var(--border)}

.chart-wrap{margin:0 20px;background:var(--chart-bg);border:1px solid var(--border);border-radius:0 8px 8px 8px;padding:16px 16px 12px 16px;position:relative;height:400px}
.chart-legend{position:absolute;top:16px;left:24px;display:flex;gap:16px;z-index:2;font-size:11px}
.chart-legend span{display:flex;align-items:center;gap:5px}
.chart-legend .sw{width:14px;height:3px;border-radius:2px}

.badge-wrap{position:absolute;right:12px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:6px;z-index:2;pointer-events:none}
.price-badge{padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;text-align:center;color:#0d1117;min-width:52px}
.price-badge.up-b{background:var(--green)}
.price-badge.down-b{background:var(--yellow)}

.controls{display:flex;gap:12px;padding:12px 20px;align-items:center;flex-wrap:wrap}
.controls label{font-size:11px;color:var(--text-dim)}
.controls select,.controls button{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:inherit}
.controls select:hover,.controls button:hover{border-color:var(--text-dim)}
.controls .export-btn{background:rgba(0,229,160,.1);border-color:rgba(0,229,160,.3);color:var(--green)}
.controls .export-btn:hover{background:rgba(0,229,160,.2)}

.table-wrap{margin:16px 20px 24px;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;max-height:360px;overflow-y:auto}
.table-wrap h3{padding:12px 16px;font-size:13px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card);z-index:1}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:40px;background:var(--card);z-index:1}
th{text-align:left;padding:8px 12px;color:var(--text-dim);font-weight:500;border-bottom:1px solid var(--border)}
td{padding:8px 12px;border-bottom:1px solid rgba(33,38,45,.5)}
tr.clickable{cursor:pointer}
tr.clickable:hover{background:rgba(0,229,160,.05)}
.outcome-up{color:var(--green);font-weight:600}
.outcome-down{color:var(--red);font-weight:600}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div class="header">
  <h1>Polymarket Collector</h1>
  <div class="status">
    <span class="dot" id="wsDot"></span>
    <span id="wsLabel">Connecting...</span>
    <span class="tick-counter" id="tickCounter"></span>
  </div>
</div>

<div class="cards" id="cards"></div>

<div class="tabs-row" id="tabs"></div>
<div class="chart-wrap">
  <div class="chart-legend">
    <span><span class="sw" style="background:var(--green)"></span>YES / UP</span>
    <span><span class="sw" style="background:var(--yellow)"></span>NO / DOWN</span>
  </div>
  <div class="badge-wrap">
    <div class="price-badge up-b" id="badgeUp">--</div>
    <div class="price-badge down-b" id="badgeDown">--</div>
  </div>
  <canvas id="mainChart"></canvas>
</div>

<div class="controls">
  <label>Window:
    <select id="durationSel">
      <option value="60">1 min</option>
      <option value="300" selected>5 min</option>
      <option value="900">15 min</option>
      <option value="3600">1 hour</option>
    </select>
  </label>
  <span style="flex:1"></span>
  <button class="export-btn" onclick="doExport('ticks')">Export Ticks JSON</button>
  <button class="export-btn" onclick="doExport('cycles')">Export Cycles JSON</button>
  <button class="export-btn" onclick="doExport('csv')">Export CSV</button>
</div>

<div class="table-wrap">
  <h3>Cycle History</h3>
  <table>
    <thead><tr><th>#</th><th>Market</th><th>Start</th><th>End</th><th>Open UP</th><th>Final UP</th><th>Outcome</th><th>Ticks</th></tr></thead>
    <tbody id="cyclesTbody"></tbody>
  </table>
</div>

<script>
const MARKETS = ['BTC_15MIN','BTC_1HOUR','ETH_15MIN','ETH_1HOUR'];
let activeTab = MARKETS[0];
let chart = null;
let ws = null;
let tickCount = 0;
const chartData = {};
const markers = {};
const status = {};
MARKETS.forEach(m => { chartData[m] = {up:[], down:[]}; markers[m] = []; });

/* ═══ WEBSOCKET ═══ */
function connectWS(){
  try {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(proto + '://' + location.host);
  } catch(e){ console.error('WS create error', e); setTimeout(connectWS, 3000); return; }

  ws.onopen = () => {
    document.getElementById('wsDot').classList.add('connected');
    document.getElementById('wsLabel').textContent = 'Live';
  };
  ws.onclose = () => {
    document.getElementById('wsDot').classList.remove('connected');
    document.getElementById('wsLabel').textContent = 'Reconnecting...';
    setTimeout(connectWS, 2000);
  };
  ws.onerror = () => {};
  ws.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      if(msg.type === 'status'){
        Object.assign(status, msg.data);
        updateCards();
      } else if(msg.type === 'tick'){
        onTick(msg.data);
      } else if(msg.type === 'cycle_close'){
        onCycleClose(msg.data);
      }
    } catch(e){ console.warn('WS msg error', e); }
  };
}

function onTick(t){
  const m = t.market;
  if(!chartData[m]) return;
  const ts = new Date(t.timestamp).getTime();
  chartData[m].up.push({x:ts, y:Number(t.price_up)});
  chartData[m].down.push({x:ts, y:Number(t.price_down)});

  if(!status[m]) status[m] = {};
  status[m].priceUp = Number(t.price_up);
  status[m].priceDown = Number(t.price_down);
  status[m].secondsRemaining = t.seconds_remaining;
  status[m].cycleId = t.cycle_id;
  status[m].active = true;

  tickCount++;
  document.getElementById('tickCounter').textContent = tickCount + ' ticks';
  updateCards();
  if(m === activeTab) refreshChart();
}

function onCycleClose(c){
  markers[c.market].push({
    time: new Date(c.cycle_end).getTime(),
    outcome: c.outcome,
    id: c.cycle_id,
  });
  addCycleRow(c);
  if(c.market === activeTab && chart) chart.update('none');
}

/* ═══ CARDS ═══ */
function renderCards(){
  document.getElementById('cards').innerHTML = MARKETS.map(m => `
    <div class="card" id="card-${m}">
      <div class="card-header">
        <span class="card-title">${m.replace('_',' ')}</span>
        <span class="card-cycle" id="cyc-${m}">--</span>
      </div>
      <div class="bar-row">
        <span class="bar-label up">UP</span>
        <div class="bar-track"><div class="bar-fill up" id="bU-${m}" style="width:50%"></div></div>
        <span class="bar-pct" id="pU-${m}">--</span>
      </div>
      <div class="bar-row">
        <span class="bar-label down">DOWN</span>
        <div class="bar-track"><div class="bar-fill down" id="bD-${m}" style="width:50%"></div></div>
        <span class="bar-pct" id="pD-${m}">--</span>
      </div>
      <div class="card-timer"><div class="label">Remaining</div><span id="tmr-${m}">--:--</span></div>
    </div>`).join('');
}

function updateCards(){
  MARKETS.forEach(m => {
    const s = status[m];
    if(!s || !s.active) return;
    const up = s.priceUp ?? 0.5, dn = s.priceDown ?? 0.5;
    const uP = Math.round(up*100), dP = Math.round(dn*100);
    const el = id => document.getElementById(id);
    el('pU-'+m).textContent = uP+'%';
    el('pD-'+m).textContent = dP+'%';
    el('bU-'+m).style.width = uP+'%';
    el('bD-'+m).style.width = dP+'%';
    el('cyc-'+m).textContent = s.cycleId ? 'Cycle #'+s.cycleId : '--';
    const card = el('card-'+m);
    card.classList.toggle('up-dominant', up > 0.6);
    card.classList.toggle('down-dominant', dn > 0.6);
    const sec = s.secondsRemaining ?? 0;
    el('tmr-'+m).textContent = String(Math.floor(sec/60)).padStart(2,'0')+':'+String(sec%60).padStart(2,'0');
  });
}

setInterval(()=>{
  MARKETS.forEach(m => {
    const s = status[m]; if(!s || s.secondsRemaining == null) return;
    if(s.secondsRemaining > 0) s.secondsRemaining--;
  });
  updateCards();
}, 1000);

/* ═══ TABS ═══ */
function renderTabs(){
  const c = document.getElementById('tabs');
  c.innerHTML = MARKETS.map(m =>
    `<div class="tab${m===activeTab?' active':''}" data-m="${m}">${m.replace('_',' ')}</div>`
  ).join('');
  c.querySelectorAll('.tab').forEach(t => t.onclick = ()=>{ activeTab=t.dataset.m; renderTabs(); switchChart(); });
}

/* ═══ CHART ═══ */
function buildChart(){
  const ctx = document.getElementById('mainChart').getContext('2d');
  const windowSec = parseInt(document.getElementById('durationSel').value);
  const now = Date.now();

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [
        {
          label: 'YES / UP',
          borderColor: '#00e5a0',
          backgroundColor: 'rgba(0,229,160,0.06)',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.3,
          fill: {target:{value:0.5}, above:'rgba(0,229,160,0.06)', below:'transparent'},
          data: chartData[activeTab].up,
        },
        {
          label: 'NO / DOWN',
          borderColor: '#f5c842',
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.3,
          fill: false,
          data: chartData[activeTab].down,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: {mode:'index', intersect:false},
      plugins: {
        legend: {display:false},
        tooltip: {
          backgroundColor:'#161b22', borderColor:'#21262d', borderWidth:1,
          titleFont:{family:'monospace',size:11}, bodyFont:{family:'monospace',size:11},
          callbacks: {
            title(items){ return items.length ? new Date(items[0].parsed.x).toLocaleTimeString() : ''; },
            label(item){ return item.dataset.label+': '+item.parsed.y.toFixed(3); },
          },
        },
      },
      scales: {
        x: {
          type: 'time',
          min: now - windowSec*1000,
          max: now,
          time: {tooltipFormat:'HH:mm:ss', displayFormats:{second:'HH:mm:ss', minute:'HH:mm'}},
          ticks: {color:'#4a5568', font:{family:'monospace',size:11}, maxRotation:0, autoSkipPadding:30},
          grid: {color:'transparent'},
        },
        y: {
          min:0, max:1,
          ticks: {stepSize:0.1, color:'#4a5568', font:{family:'monospace',size:11}, callback:v=>v.toFixed(1)},
          grid: {color:'#1e2530'},
        },
      },
    },
    plugins: [{
      id:'midline',
      beforeDraw(c){
        const y = c.scales.y.getPixelForValue(0.5);
        c.ctx.save(); c.ctx.strokeStyle='#2d3748'; c.ctx.setLineDash([6,4]); c.ctx.globalAlpha=0.5;
        c.ctx.beginPath(); c.ctx.moveTo(c.chartArea.left,y); c.ctx.lineTo(c.chartArea.right,y); c.ctx.stroke();
        c.ctx.restore();
      },
    },{
      id:'cycleLines',
      beforeDraw(ch){
        const mk = markers[activeTab]||[];
        const xs = ch.scales.x, ct = ch.ctx;
        ct.save();
        mk.forEach(m=>{
          const x = xs.getPixelForValue(m.time);
          if(x < ch.chartArea.left || x > ch.chartArea.right) return;
          ct.strokeStyle='#2d3748'; ct.setLineDash([4,4]);
          ct.beginPath(); ct.moveTo(x,ch.chartArea.top); ct.lineTo(x,ch.chartArea.bottom); ct.stroke();
          ct.setLineDash([]);
          ct.fillStyle = m.outcome==='UP' ? '#00e5a0' : '#f85149';
          ct.font='10px monospace'; ct.textAlign='center';
          ct.fillText(m.outcome+' #'+m.id, x, ch.chartArea.top+12);
          ct.beginPath(); ct.moveTo(x-4,ch.chartArea.top+16); ct.lineTo(x+4,ch.chartArea.top+16); ct.lineTo(x,ch.chartArea.top+22); ct.closePath(); ct.fill();
        });
        ct.restore();
      },
    },{
      id:'crosshair',
      afterEvent(c,args){ c._chX = args.event.type==='mousemove' ? args.event.x : null; },
      beforeDraw(c){
        if(!c._chX) return;
        const x=c._chX; if(x<c.chartArea.left||x>c.chartArea.right) return;
        c.ctx.save(); c.ctx.strokeStyle='#2d3748'; c.ctx.setLineDash([3,3]);
        c.ctx.beginPath(); c.ctx.moveTo(x,c.chartArea.top); c.ctx.lineTo(x,c.chartArea.bottom); c.ctx.stroke();
        c.ctx.restore();
      },
    }],
  });
}

let autoScroll = true;

function refreshChart(){
  if(!chart) return;
  const s = status[activeTab];
  if(s){
    document.getElementById('badgeUp').textContent = s.priceUp!=null ? s.priceUp.toFixed(3) : '--';
    document.getElementById('badgeDown').textContent = s.priceDown!=null ? s.priceDown.toFixed(3) : '--';
  }
  if(autoScroll){
    const windowSec = parseInt(document.getElementById('durationSel').value);
    const now = Date.now();
    chart.options.scales.x.min = now - windowSec*1000;
    chart.options.scales.x.max = now;
  }
  chart.update('none');
}

function switchChart(){
  if(!chart) return;
  chart.data.datasets[0].data = chartData[activeTab].up;
  chart.data.datasets[1].data = chartData[activeTab].down;
  autoScroll = true;
  refreshChart();
}

document.getElementById('durationSel').addEventListener('change', ()=>{ autoScroll=true; refreshChart(); });

document.getElementById('mainChart').addEventListener('wheel', (e)=>{
  if(!chart) return;
  e.preventDefault();
  autoScroll = false;
  const shift = e.deltaY > 0 ? -10000 : 10000;
  chart.options.scales.x.min += shift;
  chart.options.scales.x.max += shift;
  chart.update('none');
});

document.getElementById('mainChart').addEventListener('dblclick', ()=>{ autoScroll=true; refreshChart(); });

setInterval(()=>{ if(autoScroll && chart) refreshChart(); }, 1000);

/* ═══ CYCLES TABLE ═══ */
function addCycleRow(c){
  const tbody = document.getElementById('cyclesTbody');
  const tr = document.createElement('tr');
  tr.className = 'clickable';
  tr.onclick = ()=>{
    activeTab = c.market; renderTabs();
    chart.data.datasets[0].data = chartData[activeTab].up;
    chart.data.datasets[1].data = chartData[activeTab].down;
    const t0 = new Date(c.cycle_start).getTime(), t1 = new Date(c.cycle_end).getTime();
    autoScroll = false;
    chart.options.scales.x.min = t0 - 5000;
    chart.options.scales.x.max = t1 + 5000;
    chart.update('none');
    setTimeout(()=>{ autoScroll=true; }, 8000);
  };
  const fmtT = iso => { if(!iso) return '--'; const d=new Date(iso); return d.toLocaleTimeString()+' '+d.toLocaleDateString('ru',{day:'numeric',month:'short'}); };
  const fmtP = v => v!=null ? Math.round(Number(v)*100)+'%' : '--';
  const cls = c.outcome==='UP' ? 'outcome-up' : 'outcome-down';
  const ico = c.outcome==='UP' ? '✅' : '❌';
  tr.innerHTML = `<td>${c.cycle_id}</td><td>${c.market}</td><td>${fmtT(c.cycle_start)}</td><td>${fmtT(c.cycle_end)}</td><td>${fmtP(c.opening_price_up)}</td><td>${fmtP(c.final_price_up)}</td><td class="${cls}">${ico} ${c.outcome}</td><td>${c.total_ticks||'--'}</td>`;
  tbody.prepend(tr);
}

/* ═══ LOAD HISTORY ═══ */
async function loadHistory(){
  try { const r = await fetch('/api/cycles'); (await r.json()).forEach(c => addCycleRow(c)); } catch(e){ console.warn('cycles load err',e); }
}

async function loadTicks(){
  for(const m of MARKETS){
    try {
      const r = await fetch('/api/ticks?market='+m+'&limit=3600');
      const ticks = await r.json();
      ticks.forEach(t=>{
        const ts = new Date(t.timestamp).getTime();
        chartData[m].up.push({x:ts, y:Number(t.price_up)});
        chartData[m].down.push({x:ts, y:Number(t.price_down)});
      });
      if(ticks.length && !status[m]){
        const last = ticks[ticks.length-1];
        status[m] = { active:true, priceUp:Number(last.price_up), priceDown:Number(last.price_down), secondsRemaining:last.seconds_remaining, cycleId:last.cycle_id };
      }
    } catch(e){ console.warn('ticks load err '+m, e); }
  }
  updateCards();
  if(chart) chart.update('none');
}

/* ═══ EXPORT ═══ */
function doExport(type){
  const map = {ticks:'/api/export/ticks.json', cycles:'/api/export/cycles.json', csv:'/api/export/cycles.csv'};
  const a = document.createElement('a'); a.href=map[type]; a.download=''; document.body.appendChild(a); a.click(); a.remove();
}

/* ═══ FALLBACK: poll REST if WS never connects ═══ */
let lastWsOpen = 0;
setInterval(async ()=>{
  if(ws && ws.readyState === 1) { lastWsOpen = Date.now(); return; }
  if(Date.now() - lastWsOpen < 5000) return;
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    Object.keys(d).forEach(m => {
      if(!status[m]) status[m] = {};
      Object.assign(status[m], d[m]);
    });
    updateCards();
  } catch(e){}
}, 3000);

/* ═══ INIT ═══ */
renderCards();
renderTabs();
buildChart();
connectWS();
loadHistory();
loadTicks();
</script>
</body>
</html>
